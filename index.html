<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小王子的亲子问答星球 - 沉浸版</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --midnight-blue: #0B1026;
            --deep-space: #161B33;
            --star-gold: #FFD700;
            --rose-red: #FF4D4D;
            --scarf-yellow: #FFD93D;
            --scarf-orange: #FF8400;
            --text-light: #E0E0E0;
            --card-blue: rgba(20, 30, 70, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at center, #1B2735 0%, #090A0F 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* 动态星空 */
        #stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 流星 */
        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: linear-gradient(to right, rgba(255,255,255,0), rgba(255,255,255,1));
            box-shadow: 0 0 10px white;
            animation: shoot 3s linear infinite;
            z-index: 1;
            opacity: 0;
        }

        @keyframes shoot {
            0% { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 0; }
            10% { opacity: 1; }
            30% { transform: translateX(-500px) translateY(500px) rotate(-45deg); opacity: 0; }
            100% { opacity: 0; }
        }

        /* 装饰元素 */
        .illustration {
            position: fixed;
            z-index: 5;
            pointer-events: none;
            opacity: 0.8;
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.2));
        }

        .prince-img {
            bottom: 5%;
            left: 5%;
            width: 120px;
            animation: float-prince 6s infinite ease-in-out;
        }

        .rose-img {
            top: 15%;
            left: 8%;
            width: 50px;
            animation: float-rose 5s infinite ease-in-out;
        }

        .fox-img {
            bottom: 8%;
            right: 8%;
            width: 70px;
            animation: float-fox 7s infinite ease-in-out;
        }

        @keyframes float-prince { 0%, 100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-15px) rotate(2deg); } }
        @keyframes float-rose { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.05); } }
        @keyframes float-fox { 0%, 100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-12px) rotate(-3deg); } }

        .birds-img {
            top: 5%;
            right: 15%;
            width: 140px;
            opacity: 0.5;
            animation: float-birds 12s infinite ease-in-out;
        }

        @keyframes float-birds {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-30px, 20px); }
        }

        header {
            margin-top: -50px;
            margin-bottom: 2rem;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 3rem;
            color: var(--star-gold);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
            letter-spacing: 2px;
        }

        /* 围巾进度条 */
        .scarf-progress {
            margin-bottom: 2rem;
            width: 320px;
            position: relative;
            z-index: 10;
        }

        .progress-label {
            display: block;
            text-align: center;
            font-size: 0.9rem;
            color: var(--star-gold);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .scarf-track {
            height: 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .scarf-fill {
            height: 100%;
            width: 0%;
            background: repeating-linear-gradient(
                45deg,
                var(--scarf-yellow),
                var(--scarf-yellow) 10px,
                var(--scarf-orange) 10px,
                var(--scarf-orange) 20px
            );
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 10px var(--scarf-yellow);
        }

        /* 卡片设计 */
        .card-container {
            perspective: 1500px;
            width: 500px;
            height: 340px;
            z-index: 10;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .card-container { width: 90vw; height: 50vh; }
            h1 { font-size: 2rem; }
            .planet-b612 { width: 400px; height: 400px; bottom: -100px; }
            .prince-img { bottom: 280px; transform: translateX(-80px); width: 70px; }
            .rose-img { bottom: 290px; transform: translateX(40px); width: 30px; }
            .fox-img { bottom: 285px; transform: translateX(-20px); width: 40px; }
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 25px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--card-blue);
            border: 2px dashed var(--star-gold);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 30px rgba(255,215,0,0.1);
            backdrop-filter: blur(10px);
        }

        .card-back {
            transform: rotateY(180deg);
            background: rgba(10, 20, 50, 0.95);
        }

        .question-text {
            font-size: 1.8rem;
            line-height: 1.4;
            color: #FFF;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .interpretation-text {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #D1D1D1;
            font-style: italic;
        }

        .hint {
            position: absolute;
            bottom: 20px;
            font-size: 0.75rem;
            color: var(--star-gold);
            opacity: 0.6;
            letter-spacing: 1px;
        }

        /* 按钮控制 */
        .controls {
            margin-top: 2.5rem;
            display: flex;
            gap: 1rem;
            z-index: 10;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--star-gold);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 215, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            background: var(--star-gold);
            color: var(--midnight-blue);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }

        .btn-main {
            background: var(--star-gold);
            color: var(--midnight-blue);
            padding: 0.8rem 2.5rem;
        }

        .btn-main:hover {
            background: #FFE44D;
        }

        .reset-container {
            margin-top: 2rem;
            z-index: 10;
        }

        .btn-reset {
            font-size: 0.75rem;
            opacity: 0.4;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-reset:hover {
            opacity: 1;
            background: rgba(255, 77, 77, 0.2);
            border-color: var(--rose-red);
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(8px);
        }

        .modal {
            background: var(--deep-space);
            padding: 2.5rem;
            border-radius: 25px;
            text-align: center;
            max-width: 380px;
            border: 2px solid var(--star-gold);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }

        .modal h2 {
            color: var(--star-gold);
            margin-bottom: 1rem;
            font-family: 'ZCOOL KuaiLe', cursive;
        }

        .modal p {
            color: #CCC;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .modal-btns {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- 装饰元素 -->
    <div id="stars-container"></div>

    <!-- 小王子 SVG -->
    <svg class="illustration prince-img" viewBox="0 0 100 120">
        <!-- 身体 -->
        <path d="M40 100 L60 100 L55 60 L45 60 Z" fill="#2C3E50" />
        <!-- 披风/围巾 -->
        <path d="M45 60 Q30 65 20 85 Q35 75 45 65 Z" fill="#FFD93D">
            <animate attributeName="d" values="M45 60 Q30 65 20 85 Q35 75 45 65 Z; M45 60 Q25 70 15 90 Q35 75 45 65 Z; M45 60 Q30 65 20 85 Q35 75 45 65 Z" dur="3s" repeatCount="indefinite" />
        </path>
        <path d="M55 60 Q70 65 80 85 Q65 75 55 65 Z" fill="#FFD93D" />
        <!-- 头部 -->
        <circle cx="50" cy="45" r="15" fill="#FFE0BD" />
        <!-- 头发 -->
        <path d="M35 45 Q35 25 50 25 Q65 25 65 45" fill="#FFD700" stroke="#DAA520" stroke-width="1" />
        <path d="M38 35 L42 28 L48 32 L52 25 L58 32 L62 28 L65 38" fill="none" stroke="#DAA520" stroke-width="2" />
    </svg>

    <!-- 玫瑰 SVG -->
    <svg class="illustration rose-img" viewBox="0 0 50 80">
        <path d="M25 80 L25 40" stroke="#2D5A27" stroke-width="3" />
        <path d="M25 45 Q15 45 15 35 Q15 25 25 25 Q35 25 35 35 Q35 45 25 45 Z" fill="#FF4D4D" />
        <path d="M25 35 Q20 35 20 30 Q25 25 30 30 Q30 35 25 35 Z" fill="#C0392B" />
        <path d="M25 60 Q35 55 35 50" fill="none" stroke="#2D5A27" stroke-width="2" />
    </svg>

    <!-- 狐狸 SVG -->
    <svg class="illustration fox-img" viewBox="0 0 60 60">
        <path d="M10 50 Q30 55 50 50 L55 30 L45 35 L30 20 L15 35 L5 30 Z" fill="#E67E22" />
        <path d="M25 35 L30 45 L35 35 Z" fill="#FFF" />
        <circle cx="22" cy="38" r="2" fill="#000" />
        <circle cx="38" cy="38" r="2" fill="#000" />
    </svg>

    <!-- 飞鸟 SVG -->
    <svg class="illustration birds-img" viewBox="0 0 100 60">
        <path d="M10 20 Q20 10 30 20 M30 20 Q40 10 50 20" fill="none" stroke="white" stroke-width="2" />
        <path d="M40 40 Q50 30 60 40 M60 40 Q70 30 80 40" fill="none" stroke="white" stroke-width="2" />
        <path d="M60 15 Q70 5 80 15 M80 15 Q90 5 100 15" fill="none" stroke="white" stroke-width="2" />
    </svg>

    <header>
        <h1>小王子的亲子问答星球</h1>
    </header>

    <div class="scarf-progress">
        <span class="progress-label" id="progressText">探索进度: 0 / 100</span>
        <div class="scarf-track">
            <div class="scarf-fill" id="progressBar"></div>
        </div>
    </div>

    <div class="card-container" id="cardContainer">
        <div class="card" id="card">
            <div class="card-face card-front">
                <p class="question-text" id="questionText">正在降落星球...</p>
                <span class="hint">点击卡片 听听小王子的解读</span>
            </div>
            <div class="card-face card-back">
                <p class="interpretation-text" id="interpretationText">解读内容...</p>
                <span class="hint">点击卡片 回到问题</span>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" id="prevBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
            上一颗星
        </button>
        <button class="btn btn-main" id="randomBtn">
            ✨ 随机探索
        </button>
        <button class="btn" id="nextBtn">
            下一颗星
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
        </button>
    </div>

    <div class="reset-container">
        <button class="btn btn-reset" id="resetBtn">重置所有进度</button>
    </div>

    <!-- 弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>探索完毕</h2>
            <p>你已经访问了所有的星星。要重新开始这段旅程吗？</p>
            <div class="modal-btns">
                <button class="btn" style="background: #444; color: white; border: none;" id="modalCancel">再看看</button>
                <button class="btn btn-main" id="modalConfirm">重新开始</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="resetModalOverlay">
        <div class="modal">
            <h2>重置记录</h2>
            <p>确定要抹去所有的探索足迹吗？</p>
            <div class="modal-btns">
                <button class="btn" style="background: #444; color: white; border: none;" id="resetModalCancel">取消</button>
                <button class="btn btn-main" id="resetModalConfirm">确定重置</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { "id": 1, "category": "🌹 感恩类", "question": "谢谢你，因为...", "interpretation": "就像小王子给玫瑰浇水，每一句“谢谢”都会让那颗心开出更美的花。你记着的那些小事，是对方星球上最亮的星星。" },
            { "id": 2, "category": "🌹 感恩类", "question": "感谢你为我做的...", "interpretation": "小王子说，仪式感就是使某一天与其他日子不同。谢谢你做的这件事，让我的这一天闪闪发光。" },
            { "id": 3, "category": "🌹 感恩类", "question": "最想对你说谢谢的瞬间是...", "interpretation": "那一刻像沙漠里的井水，后来每次想起，都像又喝到了甘甜。说出来，让那口井永不干涸。" },
            { "id": 4, "category": "🌹 感恩类", "question": "你给过我最好的礼物是...", "interpretation": "重要的东西用眼睛是看不见的。你给的这份礼物，用心才能看见，它一直在我心里。" },
            { "id": 5, "category": "🌹 感恩类", "question": "你教会我最重要的事是...", "interpretation": "小王子从狐狸那里学会了“驯服”，我从你这里学会了...。从此，我们成了彼此独一无二的人。" },
            { "id": 6, "category": "🌹 感恩类", "question": "我最感激你陪我...", "interpretation": "哪怕什么都不做，只是坐在我身边，就像小王子看日落。有你陪着，那天边的晚霞都变得更温柔。" },
            { "id": 7, "category": "🌹 感恩类", "question": "你让我想起被理解的那次是...", "interpretation": "那一刻，你像小王子懂他的玫瑰那样懂我——知道我需要什么，即使我什么都没说。" },
            { "id": 8, "category": "🌹 感恩类", "question": "你为我做过最让我感动的事是...", "interpretation": "这件事像小王子给玫瑰罩上的玻璃罩，保护着我心里最柔软的地方。我一直记得。" },
            { "id": 9, "category": "🌹 感恩类", "question": "我最想替你分担的事是...", "interpretation": "如果我能帮你拔掉猴面包树的幼苗，你会不会轻松一点？让我试试，哪怕只是陪着你。" },
            { "id": 10, "category": "🌹 感恩类", "question": "最近一次觉得你受委屈了是...", "interpretation": "你受委屈的时候，像被风吹歪的小花。我想把你扶正，告诉你：我在呢。" },
            { "id": 11, "category": "🌹 感恩类", "question": "我最想回报你的一件事是...", "interpretation": "你给我的那些好，像星星一样多。我只想摘下一颗最亮的，放在你的手心里。" },
            { "id": 12, "category": "🌹 感恩类", "question": "你让觉得自己很特别的时刻是...", "interpretation": "那一刻，你看着我的眼神，就像小王子看着他的玫瑰——我知道，在你的星球上，只有我这一朵。" },
            { "id": 13, "category": "🌹 感恩类", "question": "我最喜欢你对我说的一句话是...", "interpretation": "那句话像沙漠里的回声，每次想起来，都让我觉得自己并不孤单。" },
            { "id": 14, "category": "🌹 感恩类", "question": "你默默为我做的那件事我其实知道...", "interpretation": "你像小王子夜里给花浇水，以为我不知道。其实我都看见了，只是没说。现在我想告诉你：谢谢你。" },
            { "id": 15, "category": "🌹 感恩类", "question": "我最想为你做的一件事是...", "interpretation": "如果你是我的玫瑰，我想为你做一件只有我能做的事。告诉我，是什么。" },
            { "id": 16, "category": "🦊 心疼类", "question": "最近一次心疼你是因为...", "interpretation": "那一刻，我仿佛看见你像被烈日晒蔫的玫瑰。我想为你遮住那道光，哪怕只有一会儿。" },
            { "id": 17, "category": "🦊 心疼类", "question": "我最怕你累着的时候是...", "interpretation": "就像小王子担心他的玫瑰被风吹倒。你累的时候，我心里就刮起了风。" },
            { "id": 18, "category": "🦊 心疼类", "question": "看到你难过我却没说话那次是...", "interpretation": "有时候，话像沙子一样堵在喉咙里。但我的沉默不是没看见，是我不知道该怎么安慰你。" },
            { "id": 19, "category": "🦊 心疼类", "question": "你为了不让我担心，隐瞒过的事是...", "interpretation": "你像那朵骄傲的玫瑰，说自己不怕老虎，其实只是不想让我担心。可你忘了，用心才能看见。" },
            { "id": 20, "category": "🦊 心疼类", "question": "我最想替你承受的事是...", "interpretation": "如果能把你的痛苦种在我的星球上，让它变成一棵普通的树，我愿意。" },
            { "id": 21, "category": "🦊 心疼类", "question": "我看到你特别累却还在坚持的时候是...", "interpretation": "你像小王子一天看了四十三次日落，明明累了，却还在等。那一刻，我想抱住你。" },
            { "id": 22, "category": "🦊 心疼类", "question": "你藏在笑容里的疲惫我看到了...", "interpretation": "笑容像玻璃罩，你把疲惫藏在里面。可我看见了，因为我的心也在看着你。" },
            { "id": 23, "category": "🦊 心疼类", "question": "我最怕你为我担心的事是...", "interpretation": "就像小王子怕玫瑰被羊吃掉。如果你担心我，我也会担心你的担心。所以，我们都要好好的。" },
            { "id": 24, "category": "🦊 心疼类", "question": "你逞强那次我其实想抱抱你...", "interpretation": "你像那朵说“我不怕风”的玫瑰，可我知道你只是在假装。那一刻，我只想轻轻抱住你。" },
            { "id": 25, "category": "🦊 心疼类", "question": "我最希望你对自己好一点的地方是...", "interpretation": "小王子对他的玫瑰那么好，可你对自己却不够好。让我来提醒你：你也值得被好好照顾。" },
            { "id": 26, "category": "🦊 心疼类", "question": "你偷偷哭过的那次我知道是因为...", "interpretation": "眼泪是心里的露水。你的那次哭泣，被我看见了。我想告诉你：哭也没关系，我会陪着你。" },
            { "id": 27, "category": "🦊 心疼类", "question": "我最怕你一个人扛着的事是...", "interpretation": "如果你扛着一座山，我只想帮你分担一块石头。一个人扛太重，我们一起就会轻一些。" },
            { "id": 28, "category": "🦊 心疼类", "question": "你累垮那次我最想说的话是...", "interpretation": "你累倒的时候，像被风吹断的花。我想说的那句话，现在终于能说了：你辛苦了，我在。" },
            { "id": 29, "category": "🦊 心疼类", "question": "我最希望你放下的事是...", "interpretation": "有些事像包袱里的石头，背久了会累。放下吧，我们一起看着它变成脚下的路。" },

        let currentIndex = 0;
        let viewedIds = new Set();

        // 初始化星空
        function createStars() {
            const container = document.getElementById('stars-container');
            const count = 150;
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.setProperty('--duration', `${2 + Math.random() * 3}s`);
                star.style.animationDelay = `${Math.random() * 5}s`;
                container.appendChild(star);
            }
            
            // 添加流星
            setInterval(() => {
                const shootingStar = document.createElement('div');
                shootingStar.className = 'shooting-star';
                shootingStar.style.left = `${50 + Math.random() * 50}%`;
                shootingStar.style.top = `${Math.random() * 30}%`;
                container.appendChild(shootingStar);
                setTimeout(() => shootingStar.remove(), 3000);
            }, 8000);
        }

        // 核心逻辑
        const card = document.getElementById('card');
        const cardContainer = document.getElementById('cardContainer');
        const questionText = document.getElementById('questionText');
        const interpretationText = document.getElementById('interpretationText');
        const progressText = document.getElementById('progressText');
        const progressBar = document.getElementById('progressBar');
        
        function loadProgress() {
            const saved = localStorage.getItem('littlePrince_Immersive');
            if (saved) {
                try {
                    viewedIds = new Set(JSON.parse(saved));
                } catch (e) { viewedIds = new Set(); }
            }
            updateUI();
        }

        function saveProgress() {
            localStorage.setItem('littlePrince_Immersive', JSON.stringify([...viewedIds]));
            updateUI();
        }

        function updateUI() {
            const count = viewedIds.size;
            const total = questions.length;
            progressText.innerText = `探索进度: ${count} / ${total}`;
            progressBar.style.width = `${(count / total) * 100}%`;
        }

        function updateCard() {
            const q = questions[currentIndex];
            if (!q) return;

            if (!viewedIds.has(q.id)) {
                viewedIds.add(q.id);
                saveProgress();
            }

            card.classList.remove('is-flipped');
            setTimeout(() => {
                questionText.innerText = q.question;
                interpretationText.innerText = q.interpretation;
            }, 150);
        }

        cardContainer.addEventListener('click', () => card.classList.toggle('is-flipped'));

        document.getElementById('prevBtn').addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + questions.length) % questions.length;
            updateCard();
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % questions.length;
            updateCard();
        });

        document.getElementById('randomBtn').addEventListener('click', () => {
            const unviewed = questions.filter(q => !viewedIds.has(q.id));
            if (unviewed.length === 0) {
                document.getElementById('modalOverlay').style.display = 'flex';
                return;
            }
            const randomIdx = Math.floor(Math.random() * unviewed.length);
            currentIndex = questions.findIndex(q => q.id === unviewed[randomIdx].id);
            updateCard();
        });

        function reset() {
            localStorage.removeItem('littlePrince_Immersive');
            viewedIds.clear();
            currentIndex = 0;
            updateUI();
            updateCard();
            document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
        }

        document.getElementById('resetBtn').addEventListener('click', () => document.getElementById('resetModalOverlay').style.display = 'flex');
        document.getElementById('resetModalConfirm').addEventListener('click', reset);
        document.getElementById('resetModalCancel').addEventListener('click', () => document.getElementById('resetModalOverlay').style.display = 'none');
        document.getElementById('modalConfirm').addEventListener('click', reset);
        document.getElementById('modalCancel').addEventListener('click', () => document.getElementById('modalOverlay').style.display = 'none');

        createStars();
        loadProgress();
        updateCard();
    </script>
